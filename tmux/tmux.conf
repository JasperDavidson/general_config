set -g prefix C-a
unbind C-b
bind C-a send-prefix

# source tmux
bind r source-file ~/.config/tmux/tmux.conf

# sessionizer
bind f run-shell "tmux-sessionizer"

# allow tmux clipboard to copy to system clipboard
set -s set-clipboard on

# sync clipboard
set -g set-clipboard on
set -g default-command "reattach-to-user-namespace -l $SHELL"

# renumber windows dynamically
set -g renumber-windows on

# vim compatibility
set mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'

# session fuzzy-finding
bind C-j display-popup -E "~/.config/tmux/session-fzf.sh"

# theme
set -g @plugin 'thekylehuang/cole-tmux'

# set up tpm
run '~/.config/tmux/plugins/tpm/tpm'
